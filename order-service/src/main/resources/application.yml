spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:15432/order_db
    username: order_user
    password: order_secret_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: orders

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: orders
    default-schema: orders
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-on-migrate: true

  kafka:
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: order-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  port: 18083

jwt:
  secret: "J2EE-IAC-Service-Super-Secret-Key-2024-Change-This-In-Production!!"

# URLs of upstream services
services:
  pricing-url: http://localhost:18082
  property-url: http://localhost:18081

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info

outbox:
  relay:
    interval-ms: 5000

logging:
  level:
    com.project.order: DEBUG
