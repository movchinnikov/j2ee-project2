spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://localhost:15432/booking_db
    username: booking_user
    password: booking_secret_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: booking

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: booking
    default-schema: booking
    baseline-on-migrate: true
    validate-on-migrate: true
    repair-on-migrate: true

server:
  port: 18090

# Same JWT secret as IAC — validates tokens issued by IAC service
jwt:
  secret: "J2EE-IAC-Service-Super-Secret-Key-2024-Change-This-In-Production!!"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.project.booking: DEBUG
